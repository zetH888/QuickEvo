<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <base href="./">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' https://esm.sh https://accounts.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.googleusercontent.com https://*.gstatic.com; connect-src 'self' https://esm.sh https://www.googleapis.com https://oauth2.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com; child-src https://accounts.google.com; worker-src 'self' blob:; font-src 'self' data:;">
    <title>QuickEvo - Wyszukiwarka Tras</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Cdefs%3E%3CradialGradient%20id%3D%27g%27%20cx%3D%2735%27%20cy%3D%2730%27%20r%3D%2780%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27%230066cc%27/%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27%230066cc%27%20stop-opacity%3D%270.35%27/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle%20cx%3D%2750%27%20cy%3D%2750%27%20r%3D%2746%27%20fill%3D%27url(%23g)%27/%3E%3Ctext%20x%3D%2750%27%20y%3D%2762%27%20text-anchor%3D%27middle%27%20font-family%3D%27Segoe%20UI%2C%20Arial%2C%20sans-serif%27%20font-size%3D%2742%27%20font-weight%3D%27800%27%20fill%3D%27%23ffffff%27%3EQE%3C/text%3E%3C/svg%3E">
    <!-- Style aplikacji (bez parametrów wersji w URL) -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/matrix.css">
    <!-- Flagi developerskie (np. warunkowe doładowanie testów) -->
    <script src="js/entry/dev-flags.js"></script>
</head>
<body class="dark-theme">
    <div id="loading-overlay" class="loading-overlay" data-welcome-seq="init">
        <div class="loading-card" role="status" aria-live="polite" aria-busy="true">
            <div id="welcome-graphic" class="welcome-graphic" aria-hidden="true"></div>
            <div id="welcome-text" class="loading-title loading-title-welcome">Witamy w QuickEvo!</div>
            <div class="loading-subtitle" id="loading-status-text">Inicjalizacja...</div>
            <div class="loading-progress">
                <progress id="loading-progress-bar" class="loading-progress-bar" max="100" value="0"></progress>
                <div class="loading-progress-meta"><span id="loading-progress-meta">0%</span></div>
            </div>
            <div id="loading-error" class="loading-error hidden" role="alert"></div>
            
            <div id="welcome-import-progress" class="welcome-import-progress hidden">
                <div class="welcome-progress-list" id="welcome-progress-list"></div>
            </div>

            <div class="loading-actions">
                <button id="sync-gdrive-button" class="loading-sync-button" type="button">
                    <svg class="btn-icon" viewBox="0 0 24 24">
                        <path d="M9.5 3h5L22 16l-3.2 5H5.2L2 16l7.5-13zm1.16 2L5.26 14h3.71l3.19-9zm2.49 0L16.34 14h3.71L14.65 5h-1.5zM8.97 16H4.38l1.9 3h12.44l1.9-3H8.97z"></path>
                    </svg>
                    Synchronizuj z Dyskiem
                </button>
                <button id="loading-continue-button" class="loading-continue-button" type="button" disabled>
                    Przejdź do aplikacji
                    <svg class="btn-icon" viewBox="0 0 24 24">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Modale systemowe -->
    <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-card">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-content" class="modal-content"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>
    <div id="app-shell" class="container app-shell app-shell-hidden" aria-hidden="true">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <div class="logo">
                        <a id="home-link" class="home-link" href="./" aria-label="QuickEvo - strona główna">
                            <div id="app-header-logo" class="app-header-logo" aria-label="QuickEvo"></div>
                        </a>
                    </div>
                    <nav class="primary-nav" aria-label="Główna nawigacja">
                        <button id="nav-routes-button" class="primary-nav-button" type="button">TRASY</button>
                        <button id="nav-drivers-button" class="primary-nav-button" type="button">PRACOWNICY</button>
                        <button id="nav-schedule-button" class="primary-nav-button" type="button">GRAFIK</button>
                    </nav>
                </div>
                <div class="toolbar">
                    <!-- Grupa akcji synchronizacji z Google Drive -->
                    <div class="toolbar-group toolbar-group--imports" role="group" aria-label="Synchronizacja z Google Drive">
                        <button id="import-google-drive-button" class="tool-btn" type="button" aria-label="Google Drive — synchronizuj folder" data-tooltip="Synchronizuj z Google Drive">
                            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M9.5 3h5L22 16l-3.2 5H5.2L2 16l7.5-13zm1.16 2L5.26 14h3.71l3.19-9zm2.49 0L16.34 14h3.71L14.65 5h-1.5zM8.97 16H4.38l1.9 3h12.44l1.9-3H8.97z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="theme-switch-container" data-tooltip="Zmień motyw">
                        <label class="theme-btn" for="theme-toggle">
                            <input type="checkbox" id="theme-toggle" checked class="hidden-checkbox">
                            <span id="theme-icon">🌙</span>
                        </label>
                    </div>
                </div>
            </div>
            <!-- Pasek postępu synchronizacji z Google Drive wyświetlany na pełną szerokość bezpośrednio pod nagłówkiem -->
            <div id="upload-progress-container" class="hidden">
                <span id="upload-status">Wysyłanie...</span>
                <progress id="upload-progress" class="upload-progress" max="100" value="0"></progress>
            </div>
        </header>

        <main>
                <div id="search-view" class="view-transition">
                <div class="search-container">
                    <div class="search-input-wrap search-input-wrap--with-sort" id="search-input-wrap">
                        <div id="qe-ghost" class="qe-ghost is-hidden" aria-hidden="true">
                            <span id="qe-ghost-prefix" class="qe-ghost-prefix"></span><span id="qe-ghost-suffix" class="qe-ghost-suffix"></span>
                        </div>
                        <button id="qe-ghost-hint" class="qe-ghost-hint" type="button" aria-label="Pokaż następną podpowiedź" title="Następna podpowiedź" tabindex="-1">↑↓</button>
                        <input type="text" id="search-input" placeholder="Szukaj..." autocomplete="off">
                        <div class="search-sort-switch" aria-label="Tryb sortowania wyników wyszukiwania">
                            <span class="search-sort-switch-label" aria-hidden="true">A‑Z</span>
                            <label class="switch">
                                <input type="checkbox" id="search-sort-toggle" aria-label="Sortowanie alfanumeryczne">
                                <span class="slider"></span>
                            </label>
                            <span class="search-sort-switch-label" aria-hidden="true">⏱</span>
                        </div>
                    </div>
                    <div id="status-indicator" class="status">Ładowanie...</div>
                </div>

                <div id="results-info" class="results-info"></div>
                <div id="results-list" class="results-list"></div>
            </div>

            <div id="routes-view" class="view-transition view-hidden">
                <div class="qe-view-header">
                    <h2 class="qe-view-title">Trasy</h2>
                </div>
                <div class="routes-sections" aria-label="Lista tras — podział na sekcje">
                    <section class="routes-section routes-section--left" aria-label="Trasy standardowe">
                        <h3 class="qe-view-subtitle">Standard</h3>
                        <div id="routes-standard-grid" class="qe-tile-grid" role="list"></div>
                    </section>
                    <section class="routes-section routes-section--right" aria-label="Trasy wieczorowe">
                        <h3 class="qe-view-subtitle">Wieczorki</h3>
                        <div id="routes-evening-grid" class="qe-tile-grid" role="list"></div>
                    </section>
                    <section class="routes-section routes-section--bottom" aria-label="Trasy na soboty i święta">
                        <h3 class="qe-view-subtitle">Soboty i święta</h3>
                        <div id="routes-weekend-grid" class="qe-tile-grid" role="list"></div>
                    </section>
                </div>
            </div>

            <div id="drivers-view" class="view-transition view-hidden">
                <div class="qe-view-header">
                    <h2 class="qe-view-title">Kierowcy</h2>
                </div>
                <div id="drivers-grid" class="qe-tile-grid" role="list" aria-label="Lista kierowców"></div>
            </div>

            <div id="file-preview-view" class="view-transition view-hidden">
                <div class="preview-actions">
                    <button id="back-to-search" class="btn-secondary">← Powrót</button>
                </div>
                <div id="preview-container">
                    <h2 id="preview-filename"></h2>
                    <div id="preview-meta" class="preview-meta hidden"></div>
                    <div class="table-container">
                        <table id="preview-table">
                            <thead><tr id="table-header"></tr></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="schedule-view" class="view-transition view-hidden">
                <div class="schedule-toolbar" aria-label="Pasek narzędzi grafiku">
                    <div class="schedule-toolbar-section schedule-toolbar-section--nav">
                        <button id="back-to-search-from-schedule" class="btn-secondary schedule-back-btn" type="button">← Powrót</button>
                        <div class="schedule-toolbar-group" role="group" aria-label="Wybór miesiąca i dnia">
                            <div class="schedule-toolbar-select-row">
                                <div class="schedule-filter-dropdown schedule-filter-dropdown--month" id="schedule-month-dropdown">
                                    <div class="schedule-filter-control schedule-filter-control--select">
                                        <button
                                            id="schedule-month-trigger"
                                            class="schedule-filter-select-trigger"
                                            type="button"
                                            aria-label="Wybierz plik grafiku"
                                            aria-haspopup="listbox"
                                            aria-expanded="false"
                                            aria-controls="schedule-month-options"
                                        >
                                            <span id="schedule-month-trigger-label" class="schedule-filter-select-trigger-label">Wybierz miesiąc</span>
                                        </button>
                                        <button
                                            id="schedule-month-toggle"
                                            class="schedule-filter-toggle"
                                            type="button"
                                            aria-label="Pokaż listę miesięcy grafiku"
                                            aria-haspopup="listbox"
                                            aria-expanded="false"
                                            aria-controls="schedule-month-options"
                                        >
                                            <span class="schedule-filter-toggle-icon" aria-hidden="true"></span>
                                        </button>
                                    </div>
                                    <div id="schedule-month-options" class="schedule-filter-menu" hidden></div>
                                    <select id="schedule-month-select" class="schedule-month-select schedule-month-select--native" aria-label="Wybierz plik grafiku"></select>
                                </div>
                            </div>
                            <div class="schedule-toolbar-nav-row">
                                <button id="schedule-prev-month" class="schedule-nav-btn" type="button" aria-label="Poprzedni dzień">←</button>
                                <button id="schedule-today" class="schedule-nav-btn schedule-nav-btn--primary" type="button">Dziś</button>
                                <button id="schedule-next-month" class="schedule-nav-btn" type="button" aria-label="Następny dzień">→</button>
                            </div>
                        </div>
                    </div>
                    <div class="schedule-toolbar-section schedule-toolbar-section--status" aria-live="polite">
                        <div id="schedule-title" class="schedule-title">Grafik</div>
                        <div id="schedule-selected-day" class="schedule-selected-day">Wybrano: brak</div>
                        <div id="schedule-subtitle" class="schedule-subtitle">Wybierz dzień lub kierowcę, aby wyróżnić grafik.</div>
                        <button
                            id="schedule-fullscreen-toggle"
                            class="schedule-nav-btn schedule-nav-btn--ghost schedule-fullscreen-btn"
                            type="button"
                            aria-label="Włącz pełny ekran grafiku"
                            aria-pressed="false"
                            title="Włącz pełny ekran grafiku"
                        >
                            <!-- Ikona wejścia w pełny ekran (grube narożniki blisko krawędzi, styl YouTube) -->
                            <svg class="schedule-fullscreen-svg schedule-fullscreen-svg--enter" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 7V2h5 M17 2h5v5 M2 17v5h5 M17 22h5v-5"/>
                            </svg>
                            <!-- Ikona wyjścia z pełnego ekranu (grube narożniki skierowane do środka, styl YouTube) -->
                            <svg class="schedule-fullscreen-svg schedule-fullscreen-svg--exit" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M7 2v5H2 M17 2v5h5 M7 22v-5H2 M17 22v-5h5"/>
                            </svg>
                        </button>
                    </div>
                    <div class="schedule-toolbar-section schedule-toolbar-section--filters">
                        <label class="schedule-filter-field" for="schedule-driver-filter">
                            <span class="schedule-filter-label">Kierowca</span>
                            <div class="schedule-filter-dropdown" id="schedule-driver-filter-dropdown">
                                <div class="schedule-filter-control">
                                    <input
                                        id="schedule-driver-filter"
                                        class="schedule-filter-input"
                                        type="search"
                                        inputmode="search"
                                        autocomplete="off"
                                        placeholder="Szukaj kierowcy"
                                        aria-label="Filtruj po kierowcy"
                                        aria-haspopup="listbox"
                                        aria-expanded="false"
                                        aria-controls="schedule-driver-filter-options"
                                    />
                                    <button
                                        id="schedule-driver-filter-toggle"
                                        class="schedule-filter-toggle"
                                        type="button"
                                        aria-label="Pokaż listę kierowców"
                                        aria-haspopup="listbox"
                                        aria-expanded="false"
                                        aria-controls="schedule-driver-filter-options"
                                    >
                                        <span class="schedule-filter-toggle-icon" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <div id="schedule-driver-filter-options" class="schedule-filter-menu" hidden></div>
                            </div>
                        </label>
                        <label class="schedule-filter-field" for="schedule-route-filter">
                            <span class="schedule-filter-label">Trasa / symbol</span>
                            <div class="schedule-filter-dropdown" id="schedule-route-filter-dropdown">
                                <div class="schedule-filter-control">
                                    <input
                                        id="schedule-route-filter"
                                        class="schedule-filter-input"
                                        type="search"
                                        inputmode="search"
                                        autocomplete="off"
                                        placeholder="Szukaj trasy lub symbolu"
                                        aria-label="Filtruj po trasie lub symbolu"
                                        aria-haspopup="listbox"
                                        aria-expanded="false"
                                        aria-controls="schedule-route-filter-options"
                                    />
                                    <button
                                        id="schedule-route-filter-toggle"
                                        class="schedule-filter-toggle"
                                        type="button"
                                        aria-label="Pokaż listę tras i kodów"
                                        aria-haspopup="listbox"
                                        aria-expanded="false"
                                        aria-controls="schedule-route-filter-options"
                                    >
                                        <span class="schedule-filter-toggle-icon" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <div id="schedule-route-filter-options" class="schedule-filter-menu" hidden></div>
                            </div>
                        </label>
                        <button id="schedule-clear-filters" class="schedule-nav-btn schedule-nav-btn--ghost" type="button" aria-label="Wyczyść filtry grafiku">
                            Wyczyść filtry
                        </button>
                    </div>
                </div>
                <div class="schedule-table-container" id="schedule-table-container">
                    <table class="schedule-table" id="schedule-table" aria-label="Grafik pracy — tabela miesięczna">
                        <thead>
                            <tr id="schedule-table-header"></tr>
                        </thead>
                        <tbody id="schedule-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer>
            <div id="file-list-info">Monitorowane pliki: <span id="file-count">0</span></div>
        </footer>
    </div>
    <!-- Logika aplikacji (bez parametrów wersji w URL) -->
    <script src="js/ui/theme/MatrixThemeToggle.js"></script>
    <script src="js/devtools/qe-debugger.js"></script>
    <script src="js/config/route-codes.js"></script>
    <script type="module" src="js/entry/app.js"></script>
</body>
</html>
